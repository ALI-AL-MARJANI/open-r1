# Grounded-R1 — Qwen2.5-32B-Instruct, v0 recipe
#
# Architecture (16 nodes total):
#   15 training nodes  — FSDP1 (not ZeRO: FSDP is more stable for 32B+ at this batch size)
#   1  vLLM node       — tensor_parallel_size=8 (32B needs full node at bf16)
#
# Critical memory choices (match open-r1's 32B findings):
#   optim: paged_adamw_8bit   — cuts optimizer state from 256GB to ~64GB
#   gradient_checkpointing    — mandatory
#   max_completion_length: 512 — shorter than 7B to fit activation memory
#   per_device_train_batch_size: 1 with gradient_accumulation_steps: 32
#
# Prerequisites:
#   python scripts/prepare_grounded_dataset.py \
#       --dataset hotpotqa --output_dir data/grounded-hotpotqa  # or squad_v2 for single-chunk
#
#   sbatch --nodes=16 slurm/train.slurm \
#       --model Grounded-R1-Qwen-32B --task grpo --config v0 --accelerator fsdp \
#       --tp 8

# ── ModelConfig ──────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-32B-Instruct
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# ── GRPOScriptArguments ──────────────────────────────────────────────────────
dataset_name: data/grounded-hotpotqa
dataset_train_split: train
dataset_test_split: validation
dataset_prompt_column: prompt

reward_funcs:
  - grounded_format
  - quote_grounding
  - chunk_routing
  - answer_faithfulness
  - reasoning_quality

# ── GRPOConfig ───────────────────────────────────────────────────────────────
output_dir: data/Grounded-R1-Qwen-32B-v0

reward_weights:
  - 1.0
  - 1.5
  - 2.0
  - 1.0
  - 0.5

system_prompt: >-
  You are an expert information extraction system. Your task is to answer questions
  based STRICTLY on the provided context chunks.

  CRITICAL RULES:
  1. You MUST ONLY use information explicitly stated in the provided context.
  2. Every claim in your final_answer MUST be directly supported by an exact extracted_quote.
  3. Your "exact_quote" values MUST be verbatim substrings copied from the context —
     no paraphrasing, no omissions, no additions.
  4. The "chunk_id" field MUST match the id of the chunk you are quoting from.
  5. If the context does not contain enough information to answer the question,
     set "is_context_sufficient": false and leave "extracted_quotes" as an empty list [].

  OUTPUT FORMAT — respond ONLY with this JSON schema (no markdown, no preamble):
  {
    "reasoning_path": "<chain-of-thought: which chunks are relevant, is context sufficient?>",
    "is_context_sufficient": <true|false>,
    "final_answer": "<synthesised answer, or abstention message if insufficient>",
    "extracted_quotes": [
      {"chunk_id": "<exact chunk id>", "exact_quote": "<verbatim text>"}
    ]
  }

# Training
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 32          # effective: 1 * 8GPUs * 15nodes * 32 = 3840
learning_rate: 5.0e-8                    # conservative for 32B
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
optim: paged_adamw_8bit                  # mandatory for 32B — halves optimizer memory

# GRPO
num_generations: 8
max_prompt_length: 2048
max_completion_length: 512               # shorter than 7B — activation memory at 32B
temperature: 0.9
beta: 0.04

# vLLM — 32B requires full node (8 GPUs) with tp=8
use_vllm: true
vllm_server_port: 8000
# Pass --tp 8 to the sbatch command (handled by train.slurm)

# Logging
logging_steps: 5
save_steps: 25
eval_strategy: steps
eval_steps: 50
num_completions_to_print: 1
report_to: wandb
wandb_project: grounded-r1

# Memory — all mandatory for 32B
bf16: true
gradient_checkpointing: true
dataloader_num_workers: 2
