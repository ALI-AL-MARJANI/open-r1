# Grounded-R1 v1 — multi-chunk GRPO recipe
# Model   : Qwen/Qwen2.5-1.5B-Instruct
# Dataset : HotpotQA distractor (10 chunks: 2 gold + 8 distractors)
# Delta vs v0: adds chunk_routing reward, larger prompt window
#
# Prerequisites:
#   python scripts/prepare_grounded_dataset.py \
#       --dataset hotpotqa --output_dir data/grounded-hotpotqa
#
#   sbatch --nodes=2 slurm/train.slurm \
#       --model Grounded-R1-Qwen-1.5B --task grpo --config v1 --accelerator zero3

# ── ModelConfig ──────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# ── GRPOScriptArguments ──────────────────────────────────────────────────────
dataset_name: data/grounded-hotpotqa
dataset_train_split: train
dataset_test_split: validation
dataset_prompt_column: prompt

reward_funcs:
  - grounded_format        # weight 1.0 — structural gate
  - quote_grounding        # weight 1.5 — no hallucinations anywhere in context
  - chunk_routing          # weight 2.0 — cite from the right chunk (v1 core signal)
  - answer_faithfulness    # weight 1.0 — final answer backed by quotes
  - reasoning_quality      # weight 0.5 — substantive CoT

# ── GRPOConfig ───────────────────────────────────────────────────────────────
output_dir: data/Grounded-R1-Qwen-1.5B-v1

reward_weights:
  - 1.0   # grounded_format
  - 1.5   # quote_grounding
  - 2.0   # chunk_routing
  - 1.0   # answer_faithfulness
  - 0.5   # reasoning_quality

system_prompt: >-
  You are an expert information extraction system. Your task is to answer questions
  based STRICTLY on the provided context chunks.

  CRITICAL RULES:
  1. You MUST ONLY use information explicitly stated in the provided context.
  2. Every claim in your final_answer MUST be directly supported by an exact extracted_quote.
  3. Your "exact_quote" values MUST be verbatim substrings copied from the context —
     no paraphrasing, no omissions, no additions.
  4. The "chunk_id" field MUST match the id of the chunk you are quoting from.
  5. If the context does not contain enough information to answer the question,
     set "is_context_sufficient": false and leave "extracted_quotes" as an empty list [].

  OUTPUT FORMAT — respond ONLY with this JSON schema (no markdown, no preamble):
  {
    "reasoning_path": "<chain-of-thought: which chunks are relevant, is context sufficient?>",
    "is_context_sufficient": <true|false>,
    "final_answer": "<synthesised answer, or abstention message if insufficient>",
    "extracted_quotes": [
      {"chunk_id": "<exact chunk id from the CONTEXT>", "exact_quote": "<verbatim text>"}
    ]
  }

# Training hyperparameters
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01

# GRPO-specific
num_generations: 8
max_prompt_length: 2048           # larger than v0: 10 chunks need more space
max_completion_length: 768        # multi-hop answers are longer
temperature: 0.9
beta: 0.04

# vLLM rollout
use_vllm: true
vllm_server_port: 8000

# Logging & saving
logging_steps: 10
save_steps: 100
eval_strategy: steps
eval_steps: 200
num_completions_to_print: 2
report_to: wandb
wandb_project: grounded-r1

# Precision
bf16: true
gradient_checkpointing: true
dataloader_num_workers: 4
