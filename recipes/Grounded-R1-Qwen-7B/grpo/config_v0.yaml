# Grounded-R1 — Qwen2.5-7B-Instruct, v0 recipe
# 4 nodes: 3 training (ZeRO-3) + 1 vLLM rollout server
#
# Key differences vs 1.5B:
#   - per_device_train_batch_size: 1 (larger model, less memory headroom)
#   - gradient_accumulation_steps: 16 → effective batch 16*8*3=384 prompts/step
#   - learning_rate: 2e-7 (scale down with model size)
#   - vllm tensor_parallel_size: 2 (7B fits on 2 GPUs at bf16)
#   - max_completion_length: 768 (7B reasons longer)
#
# Prerequisites:
#   python scripts/prepare_grounded_dataset.py \
#       --dataset squad_v2 --output_dir data/grounded-squad-v2
#
#   sbatch --nodes=4 slurm/train.slurm \
#       --model Grounded-R1-Qwen-7B --task grpo --config v0 --accelerator zero3 \
#       --tp 2

# ── ModelConfig ──────────────────────────────────────────────────────────────
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# ── GRPOScriptArguments ──────────────────────────────────────────────────────
dataset_name: data/grounded-squad-v2
dataset_train_split: train
dataset_test_split: validation
dataset_prompt_column: prompt

reward_funcs:
  - grounded_format
  - quote_grounding
  - chunk_routing
  - answer_faithfulness
  - reasoning_quality

# ── GRPOConfig ───────────────────────────────────────────────────────────────
output_dir: data/Grounded-R1-Qwen-7B-v0

reward_weights:
  - 1.0   # grounded_format
  - 1.5   # quote_grounding
  - 2.0   # chunk_routing
  - 1.0   # answer_faithfulness
  - 0.5   # reasoning_quality

system_prompt: >-
  You are an expert information extraction system. Your task is to answer questions
  based STRICTLY on the provided context chunks.

  CRITICAL RULES:
  1. You MUST ONLY use information explicitly stated in the provided context.
  2. Every claim in your final_answer MUST be directly supported by an exact extracted_quote.
  3. Your "exact_quote" values MUST be verbatim substrings copied from the context —
     no paraphrasing, no omissions, no additions.
  4. The "chunk_id" field MUST match the id of the chunk you are quoting from.
  5. If the context does not contain enough information to answer the question,
     set "is_context_sufficient": false and leave "extracted_quotes" as an empty list [].

  OUTPUT FORMAT — respond ONLY with this JSON schema (no markdown, no preamble):
  {
    "reasoning_path": "<chain-of-thought: which chunks are relevant, is context sufficient?>",
    "is_context_sufficient": <true|false>,
    "final_answer": "<synthesised answer, or abstention message if insufficient>",
    "extracted_quotes": [
      {"chunk_id": "<exact chunk id>", "exact_quote": "<verbatim text>"}
    ]
  }

# Training
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 16          # effective: 1 * 8GPUs * 3nodes * 16 = 384
learning_rate: 2.0e-7                    # scale inversely with model size
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01

# GRPO
num_generations: 8
max_prompt_length: 1024
max_completion_length: 768
temperature: 0.9
beta: 0.04

# vLLM — 7B fits on 2 GPUs with tp=2
use_vllm: true
vllm_server_port: 8000
# Pass --tp 2 to the sbatch command (handled by train.slurm)

# Logging
logging_steps: 5
save_steps: 50
eval_strategy: steps
eval_steps: 100
num_completions_to_print: 2
report_to: wandb
wandb_project: grounded-r1

# Memory
bf16: true
gradient_checkpointing: true
dataloader_num_workers: 4
